{% extends '_base.html' %}

{% block content %}
{% include 'components/_components.html' %}
{% include 'components/_default_record_types.html' %}

<div class="min-vh-100 py-3" id="app">
    <div class="container">
        <div class="row">
            <div class="col-sm">
                <div class="mb-3 row">
                    <label class="col-auto col-form-label">Из: </label>
                    <div class="col-sm-10">
                        <select class="form-select" v-model="fromType">
                            <option v-for="(val, key) in types" :key="key" :value="key" v-text="val"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm">
                <div class="mb-3 row">
                    <label class="col-auto col-form-label">В: </label>
                    <div class="col-sm-10">
                        <select class="form-select" v-model="toType">
                            <option v-for="(val, key) in types" :key="key" :value="key" v-text="val"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm">
                <button @click="start" class="btn btn-primary" :class="{ disabled: is_bnt_disabled }">Конвектировать</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/idb@6/build/iife/index-min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js" defer></script>
<script src="{{ start_url }}/static/js/db.js" defer></script>
<script src="{{ start_url }}/static/js/base.js" defer></script>
<script src="{{ start_url }}/static/js/vue_convectors.js" defer></script>
{% endblock %}
