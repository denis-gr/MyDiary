<template id="record-type-template">
    <div class="text-to-borders" v-text='record.text'></div>
</template>

<template id="record-type-form-template">
    <div class='form-field'>
        <label class='form-label'>Текст</label>
        <autosize-textarea class="form-control" v-model='record.text'></autosize-textarea>
    </div>
</template>

<template id="idea-type-template">
    <div class="text-to-borders" v-text='record.text'></div>
</template>

<template id="idea-type-form-template">
    <div class='form-field'>
        <label class='form-label'>Что за идея?</label>
        <autosize-textarea class="form-control" v-model='record.text'></autosize-textarea>
    </div>
</template>

<template id="idea-type-page-template">
    <header class="header">
        <div class="title h3 text-center">Мои идеи</div>
    </header>
    {% include 'components/_records_list.html' %}
</template>

<template id="task-type-template">
    <div class="text-to-borders task" v-text='record.text'
        :class="{overdue: new Date(record.$date + ' ' + record.$time) < new Date(), done: record.isDone}" ></div>
</template>

<template id="task-type-form-template">
    <div class='form-field'>
        <label class='form-label'>Что за идея?</label>
        <autosize-textarea class="form-control" v-model='record.text'></autosize-textarea>
    </div>
    <div class="form-check my-3">
        <input class="form-check-input" type="checkbox" v-model='record.isDone'>
        <label class="form-check-label">
          Задача выполнена.
        </label>
      </div>
    <div class='form-field' v-if="record.isDone">
        <label class='form-label'>Итоги</label>
        <autosize-textarea class="form-control" v-model='record.conclusion'></autosize-textarea>
    </div>
</template>

<template id="task-type-page-template">
    <header class="header">
        <div class="title h3 text-center">Мои задачи</div>
    </header>
    {% include 'components/_records_list.html' %}
</template>
